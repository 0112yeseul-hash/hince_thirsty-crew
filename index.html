.tresult .tag{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--oasis-deep);margin-bottom:16px}
.tresult h3{font-family:var(--serif);font-weight:300;font-size:clamp(26px,6vw,36px);margin-bottom:14px}
.tresult p{font-size:14px;color:#4c4b46;line-height:1.85;max-width:40ch;margin:0 auto}
.tresult .lvl{margin:30px auto 0;font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--sand)}
.tresult .lvl b{color:var(--oasis-deep);font-size:15px}

.join h2{font-family:var(--serif);font-weight:300;font-size:clamp(24px,5.6vw,32px);line-height:1.5;margin-bottom:26px}
.form-grid{display:flex;flex-direction:column;gap:18px;margin-top:8px}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--sand);margin-bottom:8px}
.field input{width:100%;background:#fff;border:1px solid var(--line);padding:15px 16px;font-family:var(--sans);
  font-size:15px;color:var(--ink);transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--oasis-deep)}
.field input::placeholder{color:#b9b8b2}
.field input.err{border-color:#C0564B}
.consent{background:#fff;border:1px solid var(--line);padding:16px 18px}
.consent.err{border-color:#C0564B}
.consent .row{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.consent input{width:16px;height:16px;margin-top:2px;accent-color:var(--oasis-deep);flex-shrink:0;cursor:pointer}
.consent .t{font-size:13px;font-weight:600;line-height:1.5}
.consent details{margin-top:10px}
.consent summary{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--sand);cursor:pointer}
.consent details p{margin-top:8px;font-size:12px;color:var(--sand);line-height:1.7}
.btn{display:inline-flex;justify-content:center;align-items:center;gap:10px;width:100%;
  background:var(--ink);color:var(--bone);border:none;padding:18px;margin-top:10px;
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;cursor:pointer;transition:background .25s, transform .15s, opacity .2s}
.btn:hover{background:var(--oasis-deep)}
.btn:active{transform:scale(.99)}
.btn[disabled]{opacity:.5;cursor:wait}
.note{margin-top:14px;font-size:12px;color:var(--sand);line-height:1.7;text-align:center}
.formerr{margin-top:12px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:#C0564B;text-align:center;min-height:16px}

.cardzone{display:none;animation:fade .7s ease}
.cardzone.on{display:block}
.crewcard{background:var(--ink);color:var(--bone);padding:34px 28px;position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(20,20,18,.28)}
.crewcard::before{content:"";position:absolute;right:-70px;top:-70px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle, rgba(79,167,157,.5), transparent 70%)}
.crewcard .cc-top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:#8f8e88;margin-bottom:40px}
.crewcard .cc-no{font-family:var(--mono);font-size:clamp(28px,7vw,38px);letter-spacing:.06em;color:#fff;margin-bottom:6px}
.crewcard .cc-name{font-family:var(--serif);font-weight:300;font-size:17px;color:#d8d7d1;margin-bottom:30px}
.crewcard .cc-rows{border-top:1px solid rgba(239,238,234,.18)}
.crewcard .cc-rows div{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(239,238,234,.14);font-size:12px}
.crewcard .cc-rows dt{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:#8f8e88;padding-top:2px}
.crewcard .cc-rows dd{color:#eceae4;text-align:right}
.crewcard .stamp{position:absolute;right:22px;bottom:20px;width:78px;height:78px;border:1px solid rgba(79,167,157,.9);
  border-radius:50%;display:flex;justify-content:center;align-items:center;text-align:center;
  font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;line-height:1.7;color:#7fd0c7;transform:rotate(-12deg)}
.sharebar{display:flex;gap:10px;margin-top:18px}
.sharebar .btn{margin-top:0;flex:1}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.ghost:hover{background:var(--glow);border-color:var(--oasis-deep);color:var(--oasis-deep)}
.copied{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--oasis-deep);text-align:center;margin-top:12px;min-height:16px}

footer{padding:70px 0 60px;border-top:1px solid var(--line);text-align:center}
footer .fl{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--sand)}
footer p{margin-top:12px;font-size:12px;color:var(--sand)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition-duration:.01ms!important}
  html{scroll-behavior:auto}
}
</style>
</head>
<body>
<div class="grain"></div>

<div class="hud">
  <div class="logo" id="hudLogo"></div>
  <div class="meter"><span><span id="hudLabel"></span> <b id="hudPct">0</b>%</span><div class="bar"><i id="hudBar"></i></div></div>
</div>

<main class="wrap">

  <!-- LOG 01 -->
  <section class="hero">
    <div class="eyebrow" id="e1"></div>
    <h1 class="cracked" id="heroTitle"></h1>
    <p class="sub" id="heroSub"></p>
    <div class="coords" id="coords"></div>
    <div class="scroll-cue" id="scrollCue"></div>
  </section>

  <!-- LOG 02 -->
  <section class="ritual">
    <div class="eyebrow" id="e2"></div>
    <h2 id="ritualTitle"></h2>
    <p id="ritualBody"></p>
    <div class="well" id="well" role="button" tabindex="0" aria-label="길게 눌러 수분 채우기. 스페이스 키를 누르고 있어도 됩니다.">
      <div class="water" id="water"></div>
      <div class="pct"><b id="pct">0%</b><span id="wellLabel"></span></div>
    </div>
    <div class="hint" id="hint"></div>
  </section>

  <!-- LOG 03 -->
  <section class="log oasis locked" id="oasisSec">
    <div class="eyebrow" id="e3"></div>
    <h2 id="oasisTitle"></h2>
    <p class="body" id="oasisBody"></p>
    <dl class="spec" id="spec"></dl>
  </section>

  <!-- LOG 04 -->
  <section class="log quiz locked" id="quizSec">
    <div class="eyebrow" id="e4"></div>
    <div id="quizZone"></div>
    <div class="tresult" id="tresult">
      <div class="tag" id="ttTag"></div>
      <h3 id="ttName"></h3>
      <p id="ttDesc"></p>
      <div class="lvl" id="ttLvl"></div>
    </div>
  </section>

  <!-- LOG 05 -->
  <section class="log join locked" id="joinSec">
    <div class="eyebrow" id="e5"></div>
    <h2 id="joinTitle"></h2>

    <div id="formZone" class="form-grid">
      <div class="field"><label for="fCode" id="lCode"></label>
        <input id="fCode" type="text" maxlength="12" autocomplete="off"></div>
      <div class="field"><label for="fName" id="lName"></label>
        <input id="fName" type="text" maxlength="20" autocomplete="name"></div>
      <div class="field"><label for="fTw" id="lTw"></label>
        <input id="fTw" type="text" maxlength="20" autocomplete="off"></div>
      <div class="field"><label for="fPhone" id="lPhone"></label>
        <input id="fPhone" type="tel" maxlength="20" autocomplete="tel"></div>
      <div class="field"><label for="fAddr" id="lAddr"></label>
        <input id="fAddr" type="text" maxlength="120" autocomplete="street-address"></div>

      <div class="consent" id="consentBox">
        <label class="row">
          <input type="checkbox" id="fConsent">
          <span class="t" id="consentTitle"></span>
        </label>
        <details>
          <summary>자세히 보기</summary>
          <p id="consentDetail"></p>
        </details>
      </div>

      <button class="btn" id="issueBtn"></button>
      <div class="formerr" id="formErr"></div>
      <p class="note" id="joinNote"></p>
    </div>

    <div class="cardzone" id="cardZone">
      <div class="crewcard">
        <div class="cc-top"><span id="ccTopL"></span><span id="ccTopR"></span></div>
        <div class="cc-no" id="ccNo">TC-0000</div>
        <div class="cc-name" id="ccName"></div>
        <dl class="cc-rows">
          <div><dt>THIRST TYPE</dt><dd id="ccType"></dd></div>
          <div><dt>갈증 지수</dt><dd id="ccLvl"></dd></div>
          <div><dt>MISSION</dt><dd id="ccMission"></dd></div>
          <div><dt>DESTINATION</dt><dd id="ccDest"></dd></div>
        </dl>
        <div class="stamp">OASIS<br>FOUND<br>· hince ·</div>
      </div>
      <div class="sharebar">
        <button class="btn" id="tweetBtn"></button>
        <button class="btn ghost" id="copyBtn"></button>
      </div>
      <div class="copied" id="copied"></div>
    </div>
  </section>

  <footer class="locked">
    <div class="fl" id="footLogo"></div>
    <p id="footTags"></p>
  </footer>

</main>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ── *별표* → 강조(em) 변환 ── */
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const em=s=>esc(s).replace(/\*(.+?)\*/g,'<em>$1</em>');
  const lines=arr=>arr.map(em).join('<br>');

  /* ── 문안 주입 ── */
  $('hudLogo').textContent=COPY.로고;
  $('hudLabel').textContent=COPY.게이지라벨;

  $('e1').textContent=COPY.로그01.라벨;
  $('heroTitle').innerHTML=lines(COPY.로그01.제목);
  $('heroSub').textContent=COPY.로그01.본문;
  $('coords').innerHTML=COPY.로그01.좌표.map(r=>esc(r[0])+' · <b>'+esc(r[1])+'</b>').join('<br>');
  $('scrollCue').textContent=COPY.로그01.스크롤안내;

  $('e2').textContent=COPY.로그02.라벨;
  $('ritualTitle').innerHTML=lines(COPY.로그02.제목);
  $('ritualBody').textContent=COPY.로그02.본문;
  $('wellLabel').textContent=COPY.로그02.우물안내;
  $('hint').textContent=COPY.로그02.힌트;

  $('e3').textContent=COPY.로그03.라벨;
  $('oasisTitle').innerHTML=lines(COPY.로그03.제목);
  $('oasisBody').textContent=COPY.로그03.본문;
  $('spec').innerHTML=COPY.로그03.스펙.map(r=>'<div><dt>'+esc(r[0])+'</dt><dd>'+esc(r[1])+'</dd></div>').join('');

  $('e4').textContent=COPY.로그04.라벨;
  $('ttTag').textContent=COPY.로그04.결과태그;
  const ABC=['A','B','C','D','E'];
  $('quizZone').innerHTML=COPY.로그04.질문들.map((q,i)=>
    '<div class="q'+(i===0?' on':'')+'" data-q="'+(i+1)+'">'
    +'<div class="qnum">Q.0'+(i+1)+' / 0'+COPY.로그04.질문들.length+'</div>'
    +'<h3>'+lines(q.질문)+'</h3>'
    +q.보기.map((o,j)=>'<button class="opt" data-v="'+(j+1)+'"><span class="k">'+ABC[j]+'</span>'+esc(o)+'</button>').join('')
    +'</div>').join('');

  $('e5').textContent=COPY.로그05.라벨;
  $('joinTitle').innerHTML=lines(COPY.로그05.제목);
  const F=COPY.로그05.폼;
  $('lCode').textContent=F.코드네임; $('fCode').placeholder=F.코드네임예시;
  $('lName').textContent=F.본명; $('fName').placeholder=F.본명예시;
  $('lTw').textContent=F.트위터; $('fTw').placeholder=F.트위터예시;
  $('lPhone').textContent=F.연락처; $('fPhone').placeholder=F.연락처예시;
  $('lAddr').textContent=F.주소; $('fAddr').placeholder=F.주소예시;
  $('consentTitle').textContent=COPY.로그05.동의제목;
  $('consentDetail').textContent=COPY.로그05.동의상세;
  $('issueBtn').textContent=COPY.로그05.발급버튼;
  $('joinNote').textContent=COPY.로그05.안내문;
  $('ccTopL').textContent=COPY.로그05.카드고정.상단좌;
  $('ccTopR').textContent=COPY.로고;
  $('ccMission').textContent=COPY.로그05.카드고정.미션;
  $('ccDest').textContent=COPY.로그05.카드고정.목적지;
  $('tweetBtn').textContent=COPY.로그05.트윗버튼;
  $('copyBtn').textContent=COPY.로그05.복사버튼;

  $('footLogo').textContent=COPY.푸터로고;
  $('footTags').textContent=COPY.푸터해시태그;

  /* ── 수분 의식 (press & hold) ── */
  const body=document.body, well=$('well'), water=$('water');
  let level=0, holding=false, raf=null, done=false;
  function render(){
    const v=Math.round(level);
    water.style.height=level+'%';
    $('pct').textContent=v+'%';
    $('hudPct').textContent=v;
    $('hudBar').style.width=v+'%';
  }
  function tick(){
    if(done)return;
    level+= holding ? (reduce?4:0.9) : -0.6;
    level=Math.max(0,Math.min(100,level));
    render();
    if(level>=100){finish();return;}
    if(holding||level>0){raf=requestAnimationFrame(tick);}else{raf=null;}
  }
  function start(e){ if(done)return; if(e.type==='keydown'&&e.repeat)return; holding=true; if(!raf)raf=requestAnimationFrame(tick); }
  function stop(){ holding=false; }
  function finish(){
    done=true; holding=false; level=100; render();
    well.classList.add('done');
    $('hint').textContent=COPY.로그02.완료힌트;
    $('hint').classList.add('done');
    body.classList.add('hydrated');
    setTimeout(()=>{$('oasisSec').scrollIntoView({behavior:reduce?'auto':'smooth'});},900);
  }
  well.addEventListener('pointerdown',start);
  addEventListener('pointerup',stop);
  addEventListener('pointercancel',stop);
  well.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();start(e);}});
  well.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='Enter')stop();});
  well.addEventListener('contextmenu',e=>e.preventDefault());

  /* ── 갈증 문답 ── */
  const answers=[];
  let quizDone=false, myType=null, myLvl=0;
  document.querySelectorAll('#quizZone .opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(quizDone)return;
      answers.push(+btn.dataset.v);
      const cur=btn.closest('.q');
      const next=document.querySelector('.q[data-q="'+(answers.length+1)+'"]');
      cur.classList.remove('on');
      if(next){next.classList.add('on');next.scrollIntoView({behavior:reduce?'auto':'smooth',block:'center'});}
      else showResult();
    });
  });
  function showResult(){
    quizDone=true;
    const counts={};
    answers.forEach(v=>counts[v]=(counts[v]||0)+1);
    const key=Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
    myType=COPY.로그04.타입들[key-1]||COPY.로그04.타입들[0];
    myLvl=70+Math.floor(Math.random()*30);
    $('ttName').textContent=myType.이름;
    $('ttDesc').textContent=myType.설명;
    const lvlHtml=esc(COPY.로그04.지수문구).replace('{지수}','<b>'+myLvl+'</b>');
    $('ttLvl').innerHTML=lvlHtml;
    $('tresult').classList.add('on');
    $('tresult').scrollIntoView({behavior:reduce?'auto':'smooth',block:'center'});
  }

  /* ── 신청: 검증 → 구글 시트 전송 → 카드 발급 ── */
  let crewNo='';
  function tweetText(){
    return COPY.트윗문구.join('\n')
      .replace('{크루번호}',crewNo)
      .replace('{지수}',myLvl)
      .replace('{타입}',myType?myType.이름:'');
  }
  $('issueBtn').addEventListener('click',async()=>{
    /* 필수값 검증 */
    const realName=$('fName').value.trim();
    let tw=$('fTw').value.trim();
    const phone=$('fPhone').value.trim();
    const addr=$('fAddr').value.trim();
    const consent=$('fConsent').checked;
    let ok=true;
    [['fName',realName],['fTw',tw],['fPhone',phone],['fAddr',addr]].forEach(([id,v])=>{
      $(id).classList.toggle('err',!v);
      if(!v)ok=false;
    });
    $('consentBox').classList.toggle('err',!consent);
    if(!consent)ok=false;
    if(!ok){$('formErr').textContent='필수 항목을 모두 입력하고 동의에 체크해 주세요.';return;}
    $('formErr').textContent='';
    if(tw&&!tw.startsWith('@'))tw='@'+tw;

    if(!myType){myType=COPY.로그04.타입들[1];myLvl=70+Math.floor(Math.random()*30);}
    crewNo='TC-'+String(Math.floor(1000+Math.random()*9000));
    const codename=$('fCode').value.trim()||realName;

    /* 구글 시트 전송 */
    const btn=$('issueBtn');
    btn.disabled=true; btn.textContent='전송 중…';
    const payload={
      crewNo:crewNo, codename:codename, realName:realName,
      twitter:tw, phone:phone, address:addr,
      thirstType:myType.이름, thirstLvl:myLvl,
      consent:consent?'동의':'', page:'THIRSTY CREW 티징'
    };
    if(COPY.구글시트URL){
      try{
        await fetch(COPY.구글시트URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
      }catch(err){ console.warn('시트 전송 실패:',err); }
    }else{
      console.warn('구글시트URL이 비어 있어 데이터가 전송되지 않았습니다. (문안 수정 구역 맨 아래에서 설정)');
    }
    btn.disabled=false; btn.textContent=COPY.로그05.발급버튼;

    /* 카드 발급 */
    $('ccNo').textContent=crewNo;
    $('ccName').textContent=codename+(tw?' · '+tw:'');
    $('ccType').textContent=myType.이름;
    $('ccLvl').textContent=myLvl+' / 100';
    $('formZone').style.display='none';
    $('cardZone').classList.add('on');
    $('cardZone').scrollIntoView({behavior:reduce?'auto':'smooth',block:'center'});
  });

  $('tweetBtn').addEventListener('click',()=>{
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(tweetText()),'_blank');
  });
  $('copyBtn').addEventListener('click',async()=>{
    try{
      await navigator.clipboard.writeText(tweetText());
      $('copied').textContent=COPY.로그05.복사완료;
    }catch(e){
      $('copied').textContent='복사 실패 — 문구를 길게 눌러 직접 복사해 주세요';
    }
    setTimeout(()=>{$('copied').textContent='';},2500);
  });
})();
</script>
</body>
</html>
